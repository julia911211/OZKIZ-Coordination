<!DOCTYPE html>
<html lang="ko">
  <head>
    <meta charset="UTF-8" />
    <link rel="icon" type="image/svg+xml" href="/vite.svg" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0" />
    <title>오즈키즈 | 옷체부 자동 코디 시스템</title>
    <link rel="preconnect" href="https://fonts.googleapis.com">
    <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
    <link href="https://fonts.googleapis.com/css2?family=Inter:wght@400;600;800&family=Outfit:wght@400;700&display=swap" rel="stylesheet">
  </head>
  <body>
    <div id="app" class="dashboard-layout">
      <!-- Left Sidebar -->
      <nav class="sidebar">
        <div class="sidebar-brand">
          <img src="/오즈키즈_로고_300x255.png" alt="오즈키즈 로고" style="width:45%;display:block;margin-left:14px;" />
          <img src="/20250911_옷체부_배너_정사각3.gif" alt="정기구독 옷체부" style="width:100%;border-radius:0.75rem;display:block;margin-top:-18px;" />
        </div>

        <div class="sidebar-section-label">메뉴</div>

        <div class="sidebar-menu">
          <button class="menu-item" data-tab="cust-list">
            <span class="menu-icon">👶</span>
            <span class="menu-label">고객 DB</span>
          </button>
          <button class="menu-item active" data-tab="coord">
            <span class="menu-icon">👕</span>
            <span class="menu-label">자동 코디</span>
          </button>
        </div>

        <div class="sidebar-footer">
          <p>&copy; 2026 오즈키즈</p>
        </div>
      </nav>

      <!-- Main Content Area -->
      <div class="main-viewport">
        <header class="page-header">
          <div class="header-left">
            <h1 class="page-title" id="active-view-title">옷체부 자동 코디</h1>
            <p class="page-desc">데이터 기반 옷체부 코디 자동화 시스템</p>
          </div>
          <div class="header-right">
            <div class="stats">
              <div class="stat-item">
                <span class="label">총 고객</span>
                <span class="value" id="total-customers">0</span>
              </div>
              <div class="stat-item highlighted-stat" id="selected-day-stat" style="display: none;">
                <span class="label" id="selected-day-label">오늘 결제 고객</span>
                <span class="value" id="filtered-count">0</span>
              </div>
              <div class="stat-item">
                <span class="label">등록 제품</span>
                <span class="value" id="total-products">0</span>
              </div>
            </div>
          </div>
        </header>

        <!-- View 1: Coordination Engine (Active by default) -->
        <main id="coord-view" class="tab-view active">
          <section class="controls-header">
            <div class="left-controls">
              <div class="search-box">
                <input type="text" id="customer-search" placeholder="고객명 또는 전화번호 검색..." />
              </div>
              <select id="season-select" class="season-dropdown">
                <option value="봄/가을">봄/가을</option>
                <option value="여름">여름</option>
                <option value="겨울">겨울</option>
                <option value="사계절">사계절</option>
              </select>
              <div class="date-filter-box" style="display:flex;align-items:center;gap:6px;">
                <span style="font-size:13px;color:#64748b;font-weight:600;">📅</span>
                <input type="date" id="date-from" style="border:1px solid #e2e8f0;border-radius:8px;padding:6px 10px;font-size:13px;color:#1e293b;outline:none;cursor:pointer;" />
                <span style="color:#64748b;font-weight:700;">~</span>
                <input type="date" id="date-to" style="border:1px solid #e2e8f0;border-radius:8px;padding:6px 10px;font-size:13px;color:#1e293b;outline:none;cursor:pointer;" />
                <button id="show-all-btn" style="border:1px solid #e2e8f0;background:white;border-radius:8px;padding:6px 12px;font-size:13px;font-weight:600;color:#64748b;cursor:pointer;white-space:nowrap;" onmouseover="this.style.borderColor='var(--primary)';this.style.color='var(--primary)'" onmouseout="this.style.borderColor='#e2e8f0';this.style.color='#64748b'">전체</button>
              </div>
              <button id="run-btn" class="primary-btn">자동 코디 생성하기</button>
              <button id="csv-download-btn" style="background:#10b981;color:white;border:none;border-radius:10px;padding:10px 18px;font-size:14px;font-weight:700;cursor:pointer;box-shadow:0 4px 12px rgba(16,185,129,0.3);">⬇️ 발주 CSV</button>
            </div>
            <div class="right-uploads">
              <label for="history-upload" class="upload-btn primary-upload">1. 명단 업로드</label>
              <input type="file" id="history-upload" accept=".csv" style="display: none;">
              
              <label for="history-data-upload" class="upload-btn secondary-upload">2. 이력 업로드</label>
              <input type="file" id="history-data-upload" accept=".csv" style="display: none;">

              <label for="inventory-upload" class="upload-btn tertiary-upload">3. 재고 업로드</label>
              <input type="file" id="inventory-upload" accept=".csv" style="display: none;">
            </div>
          </section>

          <section id="results-container" class="results-grid">
            <div class="empty-state">
              <p>'자동 코디 생성하기' 버튼을 눌러 업무를 시작하세요.</p>
            </div>
          </section>
        </main>

        <!-- View 2: Customer List Table (Hidden by default) -->
        <main id="cust-list-view" class="tab-view">
          <section class="table-container card-shadow">
            <div class="table-actions">
              <div class="table-filters">
                <div style="display:flex; align-items:center; gap:12px; margin-bottom:20px;">
                  <div class="search-input-group" style="display: flex; align-items: center; background: white; border: 2px solid var(--primary); border-radius: 12px; padding: 10px 16px; width: 420px; box-shadow: 0 4px 12px rgba(255,77,109,0.15);">
                    <span style="margin-right: 10px; font-size: 16px;">🔍</span>
                    <input type="text" id="customer-db-search" placeholder="이름, 연락처, 신청번호 검색..." style="border: none; outline: none; width: 100%; font-size: 15px; font-weight: 600; color: #1e293b; background: transparent;">
                  </div>
                  <button id="add-customer-btn" style="background:var(--primary);color:white;border:none;border-radius:12px;padding:10px 20px;font-size:14px;font-weight:700;cursor:pointer;white-space:nowrap;box-shadow:0 4px 12px rgba(255,77,109,0.3);">+ 고객 추가</button>
                </div>
              </div>
            </div>
            <div class="data-table-wrapper">
              <table id="customer-data-table">
                <thead>
                  <tr>
                    <th>신청번호</th>
                    <th>신청자</th>
                    <th>연락처</th>
                    <th>우편번호</th>
                    <th>주소</th>
                    <th>성별</th>
                    <th>의류 사이즈</th>
                    <th>슈즈 사이즈</th>
                    <th>정기결제일</th>
                    <th>아이 수</th>
                    <th></th>
                  </tr>
                </thead>
                <tbody id="customer-table-body">
                  <!-- Table rows will be injected here -->
                </tbody>
              </table>
            </div>
          </section>
        </main>
      </div>
    </div>

      <footer>
        <p>&copy; 2026 오즈키즈 (OZKIDS) - 옷체부 담당자용 내부 시스템</p>
      </footer>
    </div>
    <script type="module" src="/main.js"></script>
  </body>
</html>
