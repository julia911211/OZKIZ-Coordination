<!DOCTYPE html>
<html lang="ko">
  <head>
    <meta charset="UTF-8" />
    <link rel="icon" type="image/svg+xml" href="/vite.svg" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0" />
    <title>오즈키즈 | 옷체부 자동 코디 시스템</title>
    <link rel="preconnect" href="https://fonts.googleapis.com">
    <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
    <link href="https://fonts.googleapis.com/css2?family=Inter:wght@400;600;800&family=Outfit:wght@400;700&display=swap" rel="stylesheet">
  </head>
  <body>
    <div id="app" class="dashboard-layout">
      <!-- Left Sidebar -->
      <nav class="sidebar">
        <div class="sidebar-brand">
          <span class="brand-icon">💎</span>
          <span class="brand-text">OZKIZ <span class="brand-badge">PRO</span></span>
        </div>
        
        <div class="sidebar-menu">
          <button class="menu-item active" data-tab="coord">
            <span class="menu-icon">👔</span>
            <span class="menu-label">자동 코디</span>
          </button>
          <button class="menu-item" data-tab="cust-list">
            <span class="menu-icon">👥</span>
            <span class="menu-label">고객 DB</span>
          </button>

        </div>

        <div class="sidebar-footer">
          <p>&copy; 2026 오즈키즈</p>
        </div>
      </nav>

      <!-- Main Content Area -->
      <div class="main-viewport">
        <header class="page-header">
          <div class="header-left">
            <h1 class="page-title" id="active-view-title">옷체부 자동 코디</h1>
            <p class="page-desc">데이터 기반 옷체부 코디 자동화 시스템</p>
          </div>
          <div class="header-right">
            <div class="stats">
              <div class="stat-item">
                <span class="label">총 고객</span>
                <span class="value" id="total-customers">0</span>
              </div>
              <div class="stat-item highlighted-stat" id="selected-day-stat" style="display: none;">
                <span class="label" id="selected-day-label">오늘 결제 고객</span>
                <span class="value" id="filtered-count">0</span>
              </div>
              <div class="stat-item">
                <span class="label">등록 제품</span>
                <span class="value" id="total-products">0</span>
              </div>
            </div>
          </div>
        </header>

        <!-- View 1: Coordination Engine (Active by default) -->
        <main id="coord-view" class="tab-view active">
          <section class="controls-header">
            <div class="left-controls">
              <div class="search-box">
                <input type="text" id="customer-search" placeholder="고객명 또는 전화번호 검색..." />
              </div>
              <select id="season-select" class="season-dropdown">
                <option value="봄/가을">봄/가을</option>
                <option value="여름">여름</option>
                <option value="겨울">겨울</option>
                <option value="사계절">사계절</option>
              </select>
              <div class="date-filter-box">
                <button id="calendar-btn" class="icon-btn" title="결제일별 보기">📅</button>
                <select id="payday-filter" class="payday-dropdown">
                  <option value="all">전체 결제일</option>
                  <option value="today" selected>오늘 결제일</option>
                </select>
              </div>
              <button id="run-btn" class="primary-btn">자동 코디 생성하기</button>
            </div>
            <div class="right-uploads">
              <label for="history-upload" class="upload-btn primary-upload">1. 명단 업로드</label>
              <input type="file" id="history-upload" accept=".csv" style="display: none;">
              
              <label for="history-data-upload" class="upload-btn secondary-upload">2. 이력 업로드</label>
              <input type="file" id="history-data-upload" accept=".csv" style="display: none;">

              <label for="inventory-upload" class="upload-btn tertiary-upload">3. 재고 업로드</label>
              <input type="file" id="inventory-upload" accept=".csv" style="display: none;">
            </div>
          </section>

          <section id="results-container" class="results-grid">
            <div class="empty-state">
              <p>'자동 코디 생성하기' 버튼을 눌러 업무를 시작하세요.</p>
            </div>
          </section>
        </main>

        <!-- View 2: Customer List Table (Hidden by default) -->
        <main id="cust-list-view" class="tab-view">
          <section class="table-container card-shadow">
            <div class="table-actions">
              <div class="table-filters">
                <div class="search-input-group" style="display: flex; align-items: center; background: white; border: 1px solid #e2e8f0; border-radius: 8px; padding: 6px 12px; width: 350px; box-shadow: 0 1px 2px rgba(0,0,0,0.05); margin-bottom: 20px;">
                  <span class="search-icon" style="margin-right: 8px; color: #94a3b8;">🔍</span>
                  <input type="text" id="customer-db-search" placeholder="이름, 연락처, 신청번호 검색..." style="border: none; outline: none; width: 100%; font-size: 14px; color: #1e293b; background: transparent;">
                </div>
              </div>
            </div>
            <div class="data-table-wrapper">
              <table id="customer-data-table">
                <thead>
                  <tr>
                    <th>신청번호</th>
                    <th>이름</th>
                    <th>연락처</th>
                    <th>성별</th>
                    <th>의류 사이즈</th>
                    <th>슈즈 사이즈</th>
                    <th>정기결제일</th>
                    <th>아이 수</th>
                  </tr>
                </thead>
                <tbody id="customer-table-body">
                  <!-- Table rows will be injected here -->
                </tbody>
              </table>
            </div>
          </section>
        </main>
      </div>
    </div>

      <footer>
        <p>&copy; 2026 오즈키즈 (OZKIDS) - 옷체부 담당자용 내부 시스템</p>
      </footer>
    </div>
    <script type="module" src="/main.js"></script>
  </body>
</html>
